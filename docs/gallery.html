<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie Photo - NextGen Dev</title>
  <meta name="description" content="Galerie photo de NextGen Dev : moments capturés à travers nos projets et événements.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- Hero -->
  <section class="hero" style="min-height: 50vh;">
    <div class="hero-bg">
      <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=1920&q=80" alt="Gallery background">
    </div>
    <div class="container">
      <div class="hero-content">
        <div>
          <span class="hero-label">NOTRE GALERIE</span>
          <h1 class="hero-title">Galerie <span class="gradient-text">Photo</span></h1>
          <p class="hero-subtitle">Nos moments capturés à travers l'objectif</p>
          <div class="filters" style="justify-content: flex-start; flex-wrap: wrap; gap: 10px; margin-top: 24px;">
            <button class="filter-btn active" data-filter="all" onclick="filterGallery('all')">Tous</button>
            <button class="filter-btn" data-filter="Équipe" onclick="filterGallery('Équipe')">Équipe</button>
            <button class="filter-btn" data-filter="Événements" onclick="filterGallery('Événements')">Événements</button>
            <button class="filter-btn" data-filter="Workshop" onclick="filterGallery('Workshop')">Workshops</button>
            <button class="filter-btn" data-filter="Université" onclick="filterGallery('Université')">Université</button>
          </div>
        </div>
        <div class="hero-lottie">
          <div class="hero-lottie-container" data-lottie="animations/Cameras and Photography.json"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Gallery Grid -->
  <section class="section">
    <div class="container">
      <div class="gallery-grid" id="gallery-grid">
        <!-- Loaded dynamically -->
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
  <script>
    let allGalleryImages = [];
    let currentLightboxIndex = 0;
    
    async function loadGallery(category = 'all') {
      const grid = document.getElementById('gallery-grid');
      if (!grid) return;
      
      Utils.showLoading(grid);
      
      try {
        const cat = category === 'all' ? '' : category;
        console.log('Loading gallery for category:', category);
        allGalleryImages = await API.getGallery(cat);
        console.log('Received images:', allGalleryImages);
        
        if (!allGalleryImages || allGalleryImages.length === 0) {
          Utils.showEmpty(grid, 'Aucune photo dans cette catégorie');
          return;
        }
        
        renderGallery(allGalleryImages);
      } catch (error) {
        console.error('Error in loadGallery:', error);
        grid.innerHTML = `<p style="text-align:center;color:var(--gris-texte);padding:40px;">Erreur de chargement : ${error.message}. Veuillez réessayer.</p>`;
      }
    }
    
function renderGallery(images) {
  const grid = document.getElementById('gallery-grid');
  if (!grid) return;
  
  console.log('Rendering', images.length, 'images to grid');
  
  // Afficher la première URL pour debug
  if (images.length > 0) {
    console.log('First image URL:', images[0].image_url);
  }
  
  grid.innerHTML = images.map((img, i) => `
    <div class="gallery-item">
      <img src="${img.image_url}" 
           alt="${img.title || 'Photo'}" 
           onclick="openGalleryLightbox(${i})"
           onerror="console.error('Image load error:', '${img.image_url}'); this.src='https://picsum.photos/400/300?random=${i}'">
      <div class="gallery-item-overlay">
        <i data-lucide="zoom-in"></i>
        <span>${img.title || ''}</span>
      </div>
    </div>
  `).join('');
  
  lucide.createIcons();
  
  // Force l'affichage de toutes les images après le rendu
  setTimeout(() => {
    document.querySelectorAll('.gallery-item').forEach(el => {
      el.style.opacity = '1';
      el.style.visibility = 'visible';
      el.style.transform = 'none';
    });
    document.querySelectorAll('.gallery-item img').forEach(img => {
      img.style.opacity = '1';
      img.style.visibility = 'visible';
    });
  }, 100);
  
  // Désactivez temporairement les animations pour tester
  // if (typeof Animations !== 'undefined') {
  //   Animations.initScrollAnimations();
  // }
}
    // Helper global pour la lightbox
    window.openGalleryLightbox = function(index) {
      const lightboxData = allGalleryImages.map(img => ({ 
        url: img.image_url, 
        title: img.title || '' 
      }));
      Utils.Lightbox.open(lightboxData, index);
    };
    
    function filterGallery(category) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === category);
      });
      loadGallery(category);
    }
    
    // Unified Lightbox logic is now in Utils.js
    
    document.addEventListener('DOMContentLoaded', () => {
      loadGallery();
    });
  </script>
</body>
</html>
