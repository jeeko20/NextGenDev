<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Detail - NextGen Dev</title>
  <meta name="description" content="Découvrez les détails de ce projet portfolio">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- Hero -->
  <section class="hero" style="min-height: 40vh;">
    <div class="hero-bg">
      <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1920&q=80" alt="Portfolio background">
    </div>
    <div class="container">
      <div class="hero-content">
        <div>
          <span class="hero-label">PROJET DÉTAILLÉ</span>
          <h1 class="hero-title" id="project-title">Chargement...</h1>
          <p class="hero-subtitle" id="project-category">Portfolio</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Project Details -->
  <section class="section">
    <div class="container">
      <div class="project-details">
        <div class="project-gallery" id="project-gallery">
          <!-- Images will be loaded here -->
        </div>

        <div class="lightbox-overlay" id="lightbox-overlay" aria-hidden="true">
          <button class="lightbox-close" id="lightbox-close" aria-label="Fermer la galerie">
            <i data-lucide="x"></i>
          </button>
          <div class="lightbox-content">
            <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Image précédente">
              <i data-lucide="chevron-left"></i>
            </button>
            <div class="lightbox-image-wrapper">
              <img src="" alt="" id="lightbox-image">
            </div>
            <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Image suivante">
              <i data-lucide="chevron-right"></i>
            </button>
          </div>
          <div class="lightbox-caption" id="lightbox-caption"></div>
        </div>

        <div class="project-info">
          <div class="project-description" id="project-description">
            <!-- Description will be loaded here -->
          </div>

          <div class="project-meta">
            <div class="meta-item">
              <h4>Technologies utilisées</h4>
              <div class="portfolio-tags" id="project-technologies">
                <!-- Technologies will be loaded here -->
              </div>
            </div>

            <div class="meta-item">
              <h4>Date de création</h4>
              <p id="project-date">-</p>
            </div>

            <div class="meta-item" id="project-link-container" style="display: none;">
              <h4>Lien du projet</h4>
              <a href="#" target="_blank" class="btn btn-primary" id="project-link">
                <i data-lucide="external-link"></i>
                Voir le projet
              </a>
            </div>
          </div>

          <div class="project-navigation">
            <a href="portfolio.html" class="btn btn-secondary">
              <i data-lucide="arrow-left"></i>
              Retour au portfolio
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentPortfolio = null;
    let galleryImages = [];
    let lightboxIndex = 0;

    async function loadPortfolioDetails() {
      const urlParams = new URLSearchParams(window.location.search);
      const portfolioId = urlParams.get('id');

      if (!portfolioId) {
        showError('ID du portfolio manquant');
        return;
      }

      try {
        currentPortfolio = await API.getPortfolio(portfolioId);
        renderPortfolioDetails();
      } catch (error) {
        console.error('Error loading portfolio details:', error);
        showError('Erreur lors du chargement du portfolio');
      }
    }

    function renderPortfolioDetails() {
      if (!currentPortfolio) return;

      // Update hero
      document.getElementById('project-title').textContent = currentPortfolio.title;
      document.getElementById('project-category').textContent = currentPortfolio.category;

      // Update description
      document.getElementById('project-description').innerHTML = `
        <h3>Description du projet</h3>
        <p>${currentPortfolio.description}</p>
      `;

      // Update technologies
      const techContainer = document.getElementById('project-technologies');
      techContainer.innerHTML = (currentPortfolio.technologies || []).map(tech =>
        `<span class="portfolio-tag">${tech}</span>`
      ).join('');

      // Update date
      const date = new Date(currentPortfolio.created_at);
      document.getElementById('project-date').textContent =
        date.toLocaleDateString('fr-FR', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });

      // Update project link
      if (currentPortfolio.project_url && currentPortfolio.project_url !== '#') {
        document.getElementById('project-link').href = currentPortfolio.project_url;
        document.getElementById('project-link-container').style.display = 'block';
      }

      // Render gallery
      renderGallery();
    }

    function renderGallery() {
      const gallery = document.getElementById('project-gallery');
      const images = currentPortfolio.images || [];

      // If no additional images, show the main image
      if (images.length === 0 && currentPortfolio.image_url) {
        images.push({
          image_url: currentPortfolio.image_url,
          alt_text: currentPortfolio.title
        });
      }

      if (images.length === 0) {
        gallery.innerHTML = '<p style="text-align: center; color: var(--gris-texte);">Aucune image disponible</p>';
        return;
      }

      gallery.innerHTML = `
        <div class="carousel-container">
          <div class="carousel-track" id="carousel-track">
            ${images.map((image, index) => `
              <div class="carousel-slide ${index === 0 ? 'active' : ''}" data-index="${index}">
                <img src="${image.image_url}" alt="${image.alt_text || currentPortfolio.title}" loading="lazy">
              </div>
            `).join('')}
          </div>
          ${images.length > 1 ? `
            <div class="carousel-nav">
              <button class="carousel-btn" id="prev-btn">
                <i data-lucide="chevron-left"></i>
              </button>
              <div class="carousel-indicators">
                ${images.map((_, index) => `
                  <button class="carousel-indicator ${index === 0 ? 'active' : ''}" data-index="${index}"></button>
                `).join('')}
              </div>
              <button class="carousel-btn" id="next-btn">
                <i data-lucide="chevron-right"></i>
              </button>
            </div>
          ` : ''}
        </div>
      `;

      galleryImages = images;

      // Setup carousel navigation if multiple images
      if (images.length > 1) {
        setupCarousel(images.length);
      }

      attachCarouselClickHandlers();

      // Create icons
      if (window.lucide && typeof lucide.createIcons === 'function') {
        lucide.createIcons();
      }
    }

    function attachCarouselClickHandlers() {
      document.querySelectorAll('.carousel-slide img').forEach((img, index) => {
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', () => openLightbox(index));
      });
    }

    function openLightbox(index) {
      lightboxIndex = index;
      updateLightbox();
      const overlay = document.getElementById('lightbox-overlay');
      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function closeLightbox() {
      const overlay = document.getElementById('lightbox-overlay');
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
    }

    function updateLightbox() {
      const image = galleryImages[lightboxIndex];
      const imgElement = document.getElementById('lightbox-image');
      const caption = document.getElementById('lightbox-caption');
      imgElement.src = image.image_url;
      imgElement.alt = image.alt_text || currentPortfolio.title;
      caption.textContent = image.alt_text || `${currentPortfolio.title} — Image ${lightboxIndex + 1}/${galleryImages.length}`;
    }

    function showNextLightbox() {
      lightboxIndex = (lightboxIndex + 1) % galleryImages.length;
      updateLightbox();
    }

    function showPrevLightbox() {
      lightboxIndex = (lightboxIndex - 1 + galleryImages.length) % galleryImages.length;
      updateLightbox();
    }

    function setupCarousel(totalImages) {
      const track = document.getElementById('carousel-track');
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      const indicators = document.querySelectorAll('.carousel-indicator');
      let currentIndex = 0;

      function updateCarousel(index) {
        currentIndex = index;

        // Update track position
        const translateX = -index * 100;
        track.style.transform = `translateX(${translateX}%)`;

        // Update active slide
        document.querySelectorAll('.carousel-slide').forEach((slide, i) => {
          slide.classList.toggle('active', i === index);
        });

        // Update indicators
        indicators.forEach((indicator, i) => {
          indicator.classList.toggle('active', i === index);
        });
      }

      prevBtn?.addEventListener('click', () => {
        const newIndex = currentIndex > 0 ? currentIndex - 1 : totalImages - 1;
        updateCarousel(newIndex);
      });

      nextBtn?.addEventListener('click', () => {
        const newIndex = currentIndex < totalImages - 1 ? currentIndex + 1 : 0;
        updateCarousel(newIndex);
      });

      indicators.forEach((indicator, index) => {
        indicator.addEventListener('click', () => updateCarousel(index));
      });

      // Add touch/swipe support
      let startX = 0;
      let isDragging = false;

      track.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        isDragging = true;
      });

      track.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const currentX = e.touches[0].clientX;
        const diff = startX - currentX;

        if (Math.abs(diff) > 50) {
          if (diff > 0 && currentIndex < totalImages - 1) {
            updateCarousel(currentIndex + 1);
          } else if (diff < 0 && currentIndex > 0) {
            updateCarousel(currentIndex - 1);
          }
          isDragging = false;
        }
      });

      track.addEventListener('touchend', () => {
        isDragging = false;
      });
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-next').addEventListener('click', showNextLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', showPrevLightbox);
    document.getElementById('lightbox-overlay').addEventListener('click', (event) => {
      if (event.target === event.currentTarget) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (!document.getElementById('lightbox-overlay').classList.contains('active')) return;
      if (event.key === 'Escape') closeLightbox();
      if (event.key === 'ArrowRight') showNextLightbox();
      if (event.key === 'ArrowLeft') showPrevLightbox();
    });

    function showError(message) {
      document.querySelector('.container').innerHTML = `
        <div style="text-align: center; padding: 60px 20px;">
          <h2 style="color: var(--rouge);">Erreur</h2>
          <p style="color: var(--gris-texte); margin: 20px 0;">${message}</p>
          <a href="portfolio.html" class="btn btn-primary">Retour au portfolio</a>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadPortfolioDetails();
    });
  </script>
</body>
</html>
